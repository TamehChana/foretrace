# Runs on push to main/master. Optional Foretrace upload after web build.
#
# To send CI logs to Foretrace, add these repository Secrets (Settings → Secrets):
#   FORETRACE_API_URL          e.g. https://foretrace-api.onrender.com
#   FORETRACE_TOKEN            ft_ck_… (mint via POST …/cli-tokens)
#   FORETRACE_ORGANIZATION_ID  UUID
#   FORETRACE_PROJECT_ID       UUID
#
# If any secret is missing, the upload step exits 0 and is skipped (forks stay green).

name: Foretrace CI log ingest

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-and-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Intentionally no `cache: npm` — setup-node's post-step cache save can hit
      # "Path Validation Error" on monorepos; root `npm ci` is fast enough here.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build web
        run: |
          npm ci
          npm run build -w @foretrace/web 2>&1 | tee foretrace-ci.log

      - name: Upload log to Foretrace
        if: always()
        env:
          FORETRACE_API_URL: ${{ secrets.FORETRACE_API_URL }}
          FORETRACE_TOKEN: ${{ secrets.FORETRACE_TOKEN }}
          FORETRACE_ORGANIZATION_ID: ${{ secrets.FORETRACE_ORGANIZATION_ID }}
          FORETRACE_PROJECT_ID: ${{ secrets.FORETRACE_PROJECT_ID }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          (async () => {
            const apiUrl = (process.env.FORETRACE_API_URL || '').trim();
            const token = (process.env.FORETRACE_TOKEN || '').trim();
            const org = (process.env.FORETRACE_ORGANIZATION_ID || '').trim();
            const proj = (process.env.FORETRACE_PROJECT_ID || '').trim();

            if (!apiUrl || !token || !org || !proj) {
              console.log(
                'Skipping Foretrace ingest: set FORETRACE_API_URL, FORETRACE_TOKEN, FORETRACE_ORGANIZATION_ID, FORETRACE_PROJECT_ID as repository secrets.',
              );
              process.exit(0);
            }

            const path = 'foretrace-ci.log';
            if (!fs.existsSync(path)) {
              console.log('No foretrace-ci.log; skipping ingest.');
              process.exit(0);
            }

            const raw = fs.readFileSync(path, 'utf8');
            const lines = raw
              .split(/\r?\n/)
              .map((l) => l.trimEnd())
              .filter((l) => l.length > 0)
              .slice(0, 320);

            if (lines.length === 0) {
              console.log('Log file empty; skipping ingest.');
              process.exit(0);
            }

            const base = apiUrl.replace(/\/+$/, '');
            const url = `${base}/organizations/${encodeURIComponent(org)}/projects/${encodeURIComponent(proj)}/terminal/batches`;
            const body = JSON.stringify({
              lines,
              client: {
                host: 'github-actions',
                cwd: process.env.GITHUB_WORKFLOW || 'ci',
              },
            });

            const res = await fetch(url, {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
              },
              body,
            });
            const t = await res.text();
            if (!res.ok) {
              console.error('Foretrace ingest failed:', res.status, t);
              process.exit(1);
            }
            console.log('Foretrace ingest ok:', t.slice(0, 500));
            process.exit(0);
          })().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE
