services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foretrace
      POSTGRES_PASSWORD: foretrace
      POSTGRES_DB: foretrace
    ports:
      - '5432:5432'
    volumes:
      - foretrace_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foretrace -d foretrace']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  foretrace_pg_data:
