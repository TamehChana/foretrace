# Blueprint: https://render.com/docs/blueprint-spec.md
# After provision, set CORS_ORIGINS on the web service to your Vercel deployment URL(s),
# comma-separated (e.g. https://my-app.vercel.app,https://preview-xxx.vercel.app).

databases:
  - name: foretrace-db
    plan: basic-256mb
    postgresMajorVersion: '16'

services:
  - type: web
    name: foretrace-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npx turbo build --filter=@foretrace/api
    preDeployCommand: npm run db:migrate:deploy -w @foretrace/api
    startCommand: npm run start:prod -w @foretrace/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: DATABASE_URL
        fromDatabase:
          name: foretrace-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SESSION_SECRET
        sync: false
