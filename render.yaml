# Blueprint: https://render.com/docs/blueprint-spec.md
# After provision, set CORS_ORIGINS on this API service to your **Vercel SPA** origin(s)
# (the URL users open in the browser), comma-separated, no trailing slashes — NOT this API's onrender.com URL.
# Example: https://foretrace-api.vercel.app

databases:
  - name: foretrace-db
    plan: basic-256mb
    postgresMajorVersion: '16'

services:
  - type: web
    name: foretrace-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npx turbo build --filter=@foretrace/api
    preDeployCommand: npm run db:migrate:deploy -w @foretrace/api
    startCommand: npm run start:prod -w @foretrace/api
    # Use DB-backed readiness probe so Render only routes traffic once Postgres is reachable.
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: DATABASE_URL
        fromDatabase:
          name: foretrace-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: SESSION_SECRET
        sync: false
